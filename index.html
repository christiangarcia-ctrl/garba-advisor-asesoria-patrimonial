<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Finanzas con Propósito | Christian GarBa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Guía Finanzas con Propósito de Christian GarBa. PDF oficial para clientes y prospectos."
  />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, sans-serif;
      background: #0b1727;
      color: #f5f5f5;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #0b5ed7;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    header .brand {
      display: flex;
      flex-direction: column;
    }

    header .brand span:first-child {
      font-weight: 700;
      font-size: 16px;
    }

    header .brand span:last-child {
      font-size: 13px;
      opacity: 0.9;
    }

    header a.btn {
      background: #f8fafc;
      color: #0b5ed7;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      text-decoration: none;
      font-weight: 600;
      white-space: nowrap;
    }

    main {
      flex: 1;
      background: #0b1727;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
    }

    .pdf-wrapper {
      flex: 1;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      background: #111827;
    }

    .pdf-wrapper object {
      width: 100%;
      height: 100%;
      border: none;
    }

    .fallback {
      margin-top: 6px;
      font-size: 13px;
      text-align: center;
      color: #e5e7eb;
    }

    .fallback a {
      color: #60a5fa;
      font-weight: 600;
      text-decoration: none;
    }

    .fallback a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span>Christian GarBa</span>
      <span>Finanzas con Propósito · Recurso PDF</span>
    </div>
    <a
      class="btn"
      href="FINANZAS%20CON%20PROPOSITO-2.pdf"
      target="_blank"
      rel="noopener"
    >
      Descargar PDF
    </a>
  </header>

  <main>
    <div class="pdf-wrapper">
      <!-- El PDF se incrusta aquí -->
      <object
        data="FINANZAS%20CON%20PROPOSITO-2.pdf"
        type="application/pdf"
      >
        <p style="padding: 16px; font-size: 14px;">
          Si el visor de PDF no se muestra correctamente, puedes abrir el
          documento haciendo clic aquí:
          <a href="FINANZAS%20CON%20PROPOSITO-2.pdf" target="_blank" rel="noopener">
            Abrir Finanzas con Propósito (PDF)
          </a>
        </p>
      </object>
    </div>

    <p class="fallback">
      Si tu navegador no muestra el PDF, haz clic en
      <a href="FINANZAS%20CON%20PROPOSITO-2.pdf" target="_blank" rel="noopener">
        “Abrir PDF”
      </a>
      para verlo en una nueva pestaña.
    </p>
  </main>
</body>
</html>
